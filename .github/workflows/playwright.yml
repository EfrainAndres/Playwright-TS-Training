name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  api-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run API tests
      run: npm run test:api -- --reporter=html --output=test-results-api
      env:
        PLAYWRIGHT_HTML_REPORT: playwright-report-api
    - uses: actions/upload-artifact@v6
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-api
        path: playwright-report-api/
        retention-days: 30

  ui-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run UI tests
      run: npm run test:ui -- --reporter=html --output=test-results-ui
      env:
        PLAYWRIGHT_HTML_REPORT: playwright-report-ui
    - uses: actions/upload-artifact@v6
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-ui
        path: playwright-report-ui/
        retention-days: 30

  accessibility-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run accessibility tests
      run: npm run test:a11y -- --reporter=html --output=test-results-a11y
      env:
        PLAYWRIGHT_HTML_REPORT: playwright-report-a11y
    - uses: actions/upload-artifact@v6
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-a11y
        path: playwright-report-a11y/
        retention-days: 30
